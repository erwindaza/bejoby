# QA Checks - Runs on PRs from dev->qa and on push to qa
# MUST PASS before code can be promoted to main (production)
# Flow: dev -> PR to qa (CI + QA agent) -> PR to main (blocked until QA green)
name: QA Checks

on:
  pull_request:
    branches: [qa]
  push:
    branches: [qa]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate 1: CI must pass (lint, type-check, build)
  validate:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          GCP_PROJECT_ID: "build-check"
          GCP_SERVICE_ACCOUNT_KEY: "eyJjbGllbnRfZW1haWwiOiJidWlsZEBidWlsZC5pYW0uZ3NlcnZpY2VhY2NvdW50LmNvbSIsInByaXZhdGVfa2V5IjoiZmFrZSJ9"
          GEMINI_API_KEY: "build-check"

  # Gate 2: QA agent tests against live preview/production
  qa-agent:
    name: QA Agent (Automated Verification)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests

      - name: Run QA Agent (full suite)
        run: python scripts/qa-agent.py
        env:
          QA_TARGET_URL: "https://www.bejoby.com"

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa-report.json
          retention-days: 30
